<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer.js Demo: Image Segmentation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input[type="file"] {
            display: block;
            margin: 10px 0;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            background-color: #f8f9fa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Image Segmentation Demo</h1>
        <p>Upload an image to segment.</p>
        <input type="file" id="imageUpload" accept="image/*">
        <button id="analyzeButton">Segment Image</button>
        <div id="output" class="loading">Output will appear here...</div>
        <canvas id="segCanvas" width="512" height="512"></canvas>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        const outputDiv = document.getElementById('output');
        const analyzeButton = document.getElementById('analyzeButton');
        const imageUpload = document.getElementById('imageUpload');
        const canvas = document.getElementById('segCanvas');
        const ctx = canvas.getContext('2d');
        let taskPipeline = null;
        async function loadModel() {
            outputDiv.textContent = 'Loading model...';
            try {
                taskPipeline = await pipeline('image-segmentation', 'Xenova/deeplabv3_resnet50');
                outputDiv.textContent = 'Model loaded!';
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        async function performTask() {
            if (!imageUpload.files[0]) return outputDiv.textContent = 'Upload an image.';
            if (!taskPipeline) return outputDiv.textContent = 'Model loading...';
            outputDiv.textContent = 'Processing...';
            try {
                const image = await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = URL.createObjectURL(imageUpload.files[0]);
                });
                const result = await taskPipeline(image);
                // Simple visualization: draw first mask
                if (result.length > 0) {
                    const mask = result[0].mask; // Assume it's a tensor
                    const width = mask.shape[1];
                    const height = mask.shape[0];
                    canvas.width = width;
                    canvas.height = height;
                    const imageData = ctx.createImageData(width, height);
                    const data = mask.data;
                    for (let i = 0; i < data.length; i++) {
                        const val = data[i] * 255;
                        imageData.data[i * 4] = val;
                        imageData.data[i * 4 + 1] = 0;
                        imageData.data[i * 4 + 2] = 0;
                        imageData.data[i * 4 + 3] = 255;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    outputDiv.textContent = 'Segmentation mask rendered (red for segment).';
                } else {
                    outputDiv.textContent = 'No segments found.';
                }
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        analyzeButton.addEventListener('click', performTask);
        loadModel();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer.js Demo: Zero-Shot Object Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input[type="file"] {
            display: block;
            margin: 10px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            background-color: #f8f9fa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        canvas {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Zero-Shot Object Detection Demo</h1>
        <p>Upload an image and enter comma-separated class names.</p>
        <input type="file" id="imageUpload" accept="image/*">
        <input id="classes" placeholder="Classes (comma-separated, e.g., car,person)...">
        <button id="analyzeButton">Detect</button>
        <div id="output" class="loading">Output will appear here...</div>
        <canvas id="detectionCanvas"></canvas>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        const outputDiv = document.getElementById('output');
        const analyzeButton = document.getElementById('analyzeButton');
        const imageUpload = document.getElementById('imageUpload');
        const classesInput = document.getElementById('classes');
        const canvas = document.getElementById('detectionCanvas');
        const ctx = canvas.getContext('2d');
        let taskPipeline = null;
        async function loadModel() {
            outputDiv.textContent = 'Loading model...';
            try {
                taskPipeline = await pipeline('zero-shot-object-detection', 'Xenova/owlvit-base-patch32');
                outputDiv.textContent = 'Model loaded!';
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        async function performTask() {
            if (!imageUpload.files[0]) return outputDiv.textContent = 'Upload an image.';
            const classes = classesInput.value.trim().split(',').map(c => c.trim());
            if (classes.length < 1) return outputDiv.textContent = 'Enter at least one class.';
            if (!taskPipeline) return outputDiv.textContent = 'Model loading...';
            outputDiv.textContent = 'Processing...';
            try {
                const image = await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = URL.createObjectURL(imageUpload.files[0]);
                });
                canvas.width = image.width;
                canvas.height = image.height;
                ctx.drawImage(image, 0, 0);
                const result = await taskPipeline(image, classes);
                result.forEach((det, index) => {
                    ctx.strokeStyle = 'blue';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(det.box.xmin, det.box.ymin, det.box.xmax - det.box.xmin, det.box.ymax - det.box.ymin);
                    ctx.fillStyle = 'blue';
                    ctx.fillText(`${det.label} (${det.score.toFixed(2)})`, det.box.xmin, det.box.ymin - 5);
                });
                outputDiv.textContent = `Detected ${result.length} objects.`;
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        analyzeButton.addEventListener('click', performTask);
        loadModel();
    </script>
</body>

</html>

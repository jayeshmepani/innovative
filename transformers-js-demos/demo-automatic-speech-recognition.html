<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer.js Demo: Automatic Speech Recognition</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            background-color: #f8f9fa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Automatic Speech Recognition Demo</h1>
        <p>Click to record audio for transcription (requires microphone access).</p>
        <button id="recordButton">Start Recording</button>
        <button id="stopButton" disabled>Stop Recording</button>
        <div id="output" class="loading">Output will appear here...</div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        const outputDiv = document.getElementById('output');
        const recordButton = document.getElementById('recordButton');
        const stopButton = document.getElementById('stopButton');
        let taskPipeline = null;
        let recorder = null;
        let audioChunks = [];
        async function loadModel() {
            outputDiv.textContent = 'Loading model...';
            try {
                taskPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small.en');
                outputDiv.textContent = 'Model loaded! Ready to record.';
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => audioChunks.push(e.data);
                recorder.onstop = processAudio;
                recorder.start();
                recordButton.disabled = true;
                stopButton.disabled = false;
                outputDiv.textContent = 'Recording...';
            } catch (error) {
                outputDiv.textContent = `Error accessing microphone: ${error.message}`;
            }
        }
        function stopRecording() {
            recorder.stop();
            recordButton.disabled = false;
            stopButton.disabled = true;
        }
        async function processAudio() {
            if (!taskPipeline) return outputDiv.textContent = 'Model loading...';
            outputDiv.textContent = 'Processing audio...';
            try {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                audioChunks = [];
                const audio = await blob.arrayBuffer();
                const result = await taskPipeline(audio);
                outputDiv.textContent = result.text;
            } catch (error) {
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }
        recordButton.addEventListener('click', startRecording);
        stopButton.addEventListener('click', stopRecording);
        loadModel();
    </script>
</body>

</html>
